spring.application.name=quizCards
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_cards?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mvc.hiddenmethod.filter.enabled=true

# Demo data

app.demo-data.enabled=${DEMO_DATA_ENABLED:true}
app.demo-user.username=${DEMO_USERNAME:demo}
app.demo-user.password=${DEMO_PASSWORD:Demo123!}
app.demo-user.email=${DEMO_EMAIL:demo@example.com}